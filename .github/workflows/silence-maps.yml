# .github/workflows/silence-maps.yml
name: Build silence maps

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Kaynak"
        required: true
        default: "fspneu"
        type: choice
        options:
          - fspneu
          - current
      only_new:
        description: "Sadece yeni dosyalar"
        required: true
        default: true
        type: boolean
      batch_size:
        description: "Batch boyutu"
        required: true
        default: "5"
        type: string
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: silence-maps-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: FFmpeg kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Bağımlılıklar
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Parametreleri hazırla
        id: params
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "source=${{ inputs.source }}" >> "$GITHUB_OUTPUT"
            echo "batch_size=${{ inputs.batch_size }}" >> "$GITHUB_OUTPUT"
            if [[ "${{ inputs.only_new }}" == "true" ]]; then
              echo "only_new=--only-new" >> "$GITHUB_OUTPUT"
            else
              echo "only_new=" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "source=fspneu" >> "$GITHUB_OUTPUT"
            echo "batch_size=5" >> "$GITHUB_OUTPUT"
            echo "only_new=--only-new" >> "$GITHUB_OUTPUT"
          fi

      - name: Silence map üret
        run: |
          python tools/build_silence_maps.py \
            --source "${{ steps.params.outputs.source }}" \
            --output silence-maps \
            ${{ steps.params.outputs.only_new }} \
            --batch-size "${{ steps.params.outputs.batch_size }}" \
            --per-file-sleep-sec 0.8 \
            --per-batch-sleep-sec 3.0

      - name: Değişiklik varsa commit et
        shell: bash
        run: |
          if git diff --quiet -- silence-maps; then
            echo "Değişiklik yok."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add silence-maps
          git commit -m "chore: update silence maps"
          git push
